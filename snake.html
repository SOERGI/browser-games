<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: system-ui, -apple-system, sans-serif;
    color: #eee;
    gap: 16px;
  }

  h1 { font-size: 2rem; letter-spacing: 2px; }

  #hud {
    display: flex;
    gap: 32px;
    font-size: 1.15rem;
  }

  #hud span { font-weight: 600; }

  canvas {
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    display: block;
  }

  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s;
  }

  #overlay.visible {
    pointer-events: auto;
    opacity: 1;
  }

  #overlay h2 { font-size: 1.6rem; }

  #overlay p { font-size: 1.1rem; opacity: .8; }

  button {
    padding: 10px 28px;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: #2ec44d;
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 1px;
    transition: background .2s;
  }

  button:hover { background: #25a33f; }
</style>
</head>
<body>

<h1>SNAKE</h1>
<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Best: <span id="best">0</span></div>
</div>

<div style="position:relative; display:flex; align-items:center; justify-content:center;">
  <canvas id="canvas"></canvas>
  <div id="overlay" class="visible">
    <h2 id="overlay-title">SNAKE</h2>
    <p id="overlay-msg">Press any arrow key or click Start</p>
    <button id="start-btn">START</button>
  </div>
</div>

<script>
const GRID = 20;
const COLS = 25;
const ROWS = 25;
const WIDTH = COLS * GRID;
const HEIGHT = ROWS * GRID;
const TICK_MS = 100;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = WIDTH;
canvas.height = HEIGHT;

const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayMsg = document.getElementById('overlay-msg');
const startBtn = document.getElementById('start-btn');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

let snake, dir, nextDir, food, score, best = 0, running, loopId;

function init() {
  const midC = Math.floor(COLS / 2);
  const midR = Math.floor(ROWS / 2);
  snake = [
    { x: midC, y: midR },
    { x: midC - 1, y: midR },
    { x: midC - 2, y: midR },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  scoreEl.textContent = 0;
  running = true;
  placeFood();
  overlay.classList.remove('visible');
  clearInterval(loopId);
  loopId = setInterval(tick, TICK_MS);
}

function placeFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (occupied.has(`${pos.x},${pos.y}`));
  food = pos;
}

function tick() {
  if (!running) return;

  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return gameOver();
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function gameOver() {
  running = false;
  clearInterval(loopId);
  if (score > best) {
    best = score;
    bestEl.textContent = best;
  }
  overlayTitle.textContent = 'GAME OVER';
  overlayMsg.textContent = `Score: ${score}`;
  startBtn.textContent = 'PLAY AGAIN';
  overlay.classList.add('visible');
}

function draw() {
  // Background
  ctx.fillStyle = '#0f1626';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= WIDTH; x += GRID) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, HEIGHT); ctx.stroke();
  }
  for (let y = 0; y <= HEIGHT; y += GRID) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WIDTH, y); ctx.stroke();
  }

  // Food
  ctx.fillStyle = '#e63946';
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();

  // Snake
  snake.forEach((seg, i) => {
    const radius = 3;
    const x = seg.x * GRID + 1;
    const y = seg.y * GRID + 1;
    const size = GRID - 2;

    if (i === 0) {
      ctx.fillStyle = '#2ec44d';
    } else {
      ctx.fillStyle = '#27a844';
    }

    ctx.beginPath();
    ctx.roundRect(x, y, size, size, radius);
    ctx.fill();
  });
}

// Input
document.addEventListener('keydown', (e) => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
  }

  if (!running && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    if (overlay.classList.contains('visible')) init();
    return;
  }

  switch (e.key) {
    case 'ArrowUp':    if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; break;
    case 'ArrowDown':  if (dir.y !== -1) nextDir = { x: 0, y: 1 };  break;
    case 'ArrowLeft':  if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; break;
    case 'ArrowRight': if (dir.x !== -1) nextDir = { x: 1, y: 0 };  break;
  }
});

startBtn.addEventListener('click', init);

// Initial draw
draw = (() => {
  const origDraw = draw;
  // Draw an empty board initially
  ctx.fillStyle = '#0f1626';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  return origDraw;
})();
</script>
</body>
</html>
