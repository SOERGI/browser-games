<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect Four</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: system-ui, -apple-system, sans-serif;
    color: #eee;
    gap: 20px;
  }

  h1 { font-size: 2rem; letter-spacing: 2px; }

  #status {
    font-size: 1.25rem;
    height: 2rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #status .disc {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: inline-block;
  }

  .board {
    background: #0057b8;
    padding: 12px;
    border-radius: 12px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }

  .cell {
    width: 64px;
    height: 64px;
    background: #1a1a2e;
    border-radius: 50%;
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }

  .cell.red    { background: #e63946; }
  .cell.yellow { background: #ffd60a; }

  .cell.preview-red    { background: rgba(230,57,70,.3); }
  .cell.preview-yellow { background: rgba(255,214,10,.3); }

  .cell.win {
    animation: pulse .6s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    from { transform: scale(1); }
    to   { transform: scale(1.1); }
  }

  @keyframes drop {
    from { transform: translateY(calc(-72px * var(--drop-rows))); opacity: .7; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .cell.dropping {
    animation: drop .3s ease-in;
  }

  button#reset {
    padding: 10px 28px;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: #e63946;
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 1px;
    transition: background .2s;
  }

  button#reset:hover { background: #c1121f; }

  .board.locked {
    opacity: 0.6;
    pointer-events: none;
  }

  /* Lobby overlay */
  #lobby {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 22, 38, .92);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }

  #lobby.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .lobby-card {
    background: #16213e;
    border-radius: 16px;
    padding: 36px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }

  .lobby-card h2 {
    font-size: 1.6rem;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .lobby-subtitle {
    color: #888;
    margin-bottom: 24px;
    font-size: 0.95rem;
  }

  .lobby-btn {
    display: block;
    width: 100%;
    padding: 12px 20px;
    margin-bottom: 10px;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background .2s;
    color: #fff;
  }

  .lobby-btn.primary { background: #e63946; }
  .lobby-btn.primary:hover { background: #c1121f; }
  .lobby-btn.secondary { background: #3a506b; }
  .lobby-btn.secondary:hover { background: #2c3e57; }

  .room-code {
    font-size: 2.2rem;
    letter-spacing: 8px;
    font-family: monospace;
    background: #0f1626;
    padding: 14px 20px;
    border-radius: 8px;
    margin: 16px 0;
    color: #ffd60a;
  }

  .share-btn {
    padding: 10px 24px;
    font-size: 0.9rem;
    border: none;
    border-radius: 8px;
    background: #ffd60a;
    color: #1a1a2e;
    cursor: pointer;
    font-weight: 600;
    transition: background .2s;
  }

  .share-btn:hover { background: #e6c200; }

  .lobby-status {
    color: #888;
    font-size: 0.9rem;
    margin-top: 14px;
  }

  #room-input {
    width: 100%;
    padding: 12px;
    font-size: 1.3rem;
    text-align: center;
    letter-spacing: 6px;
    font-family: monospace;
    background: #0f1626;
    border: 2px solid #3a506b;
    border-radius: 8px;
    color: #eee;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  #room-input::placeholder {
    letter-spacing: 2px;
    font-size: 1rem;
    color: #555;
  }

  #room-input:focus {
    outline: none;
    border-color: #ffd60a;
  }

  /* Video */
  .video-el {
    position: fixed;
    width: 140px;
    border-radius: 12px;
    border: 2px solid #3a506b;
    z-index: 20;
    object-fit: cover;
    background: #0f1626;
  }

  .video-el.hidden { display: none; }

  #media-controls {
    position: fixed;
    bottom: 16px;
    right: 50%;
    transform: translateX(50%);
    z-index: 21;
    display: flex;
    gap: 8px;
  }

  #media-controls.hidden { display: none; }

  .media-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: #3a506b;
    color: #eee;
    font-size: 1.2rem;
    cursor: pointer;
    transition: background .2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .media-btn:hover { background: #4a6a8b; }
  .media-btn.off { background: #e63946; }

  #debug-panel {
    position: fixed;
    top: 8px;
    right: 8px;
    z-index: 50;
    background: rgba(0,0,0,.85);
    color: #0f0;
    font: 11px/1.5 monospace;
    padding: 10px 14px;
    border-radius: 8px;
    max-width: 340px;
    white-space: pre;
    pointer-events: none;
  }

  #debug-panel.hidden { display: none; }

  #local-video {
    bottom: 16px;
    right: 16px;
    transform: scaleX(-1);
  }

  #remote-video {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  #remote-canvas {
    position: fixed;
    bottom: 16px;
    left: 16px;
    width: 140px;
    border-radius: 12px;
    border: 2px solid #3a506b;
    z-index: 20;
    background: #0f1626;
  }

  #remote-canvas.hidden { display: none; }

  /* Modal */
  #modal {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 22, 38, .85);
  }

  .modal-card {
    background: #16213e;
    border-radius: 12px;
    padding: 28px 32px;
    text-align: center;
    max-width: 340px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
  }

  .modal-card p {
    margin-bottom: 20px;
    font-size: 1.05rem;
    line-height: 1.5;
  }

  .modal-card button {
    padding: 8px 22px;
    font-size: 0.95rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 0 6px;
    color: #fff;
  }

  #modal-yes { background: #e63946; }
  #modal-yes:hover { background: #c1121f; }
  #modal-no { background: #3a506b; }
  #modal-no:hover { background: #2c3e57; }

  #version {
    position: fixed;
    bottom: 4px;
    right: 4px;
    font-size: 10px;
    color: #444;
  }

  @media (max-width: 560px) {
    .cell { width: 44px; height: 44px; }
    .board { gap: 6px; padding: 8px; }
    .lobby-card { padding: 24px 16px; }
    .video-el { width: 100px; }
    #remote-canvas { width: 100px; }
    .room-code { font-size: 1.6rem; letter-spacing: 6px; }
  }
</style>
</head>
<body>

<div id="version">v11</div>
<h1>CONNECT FOUR</h1>
<div id="status"></div>
<div class="board" id="board"></div>
<button id="reset">NEW GAME</button>

<div id="lobby" class="visible">
  <div class="lobby-card">
    <h2>CONNECT FOUR</h2>
    <p class="lobby-subtitle">Choose a mode</p>
    <div id="lobby-menu">
      <button class="lobby-btn primary" id="btn-local">Local 2-Player</button>
      <button class="lobby-btn primary" id="btn-create">Create Online Game</button>
      <button class="lobby-btn secondary" id="btn-show-join">Join with Code</button>
      <div id="join-input" style="display:none">
        <input type="text" id="room-input" placeholder="ROOM CODE" maxlength="4">
        <button class="lobby-btn primary" id="btn-join">Connect</button>
      </div>
    </div>
    <div id="lobby-waiting" style="display:none">
      <p>Share this code with your opponent:</p>
      <div class="room-code" id="room-code-display"></div>
      <button class="share-btn" id="btn-share">Copy Link</button>
      <p class="lobby-status" id="lobby-status">Waiting for opponent...</p>
    </div>
    <div id="lobby-joining" style="display:none">
      <p class="lobby-status" id="joining-status">Connecting...</p>
    </div>
    <div id="lobby-error" style="display:none">
      <p class="lobby-status" id="error-msg" style="color:#e63946"></p>
      <button class="lobby-btn secondary" id="btn-back">Back</button>
    </div>
  </div>
</div>

<video id="local-video" class="video-el hidden" autoplay muted playsinline></video>
<video id="remote-video" autoplay playsinline></video>
<canvas id="remote-canvas" class="hidden"></canvas>

<div id="media-controls" class="hidden">
  <button class="media-btn" id="btn-mic" title="Toggle microphone">🎤</button>
  <button class="media-btn" id="btn-cam" title="Toggle camera">📷</button>
  <button class="media-btn" id="btn-speaker" title="Toggle speaker">🔊</button>
  <button class="media-btn" id="btn-debug" title="Debug info">🐛</button>
  <button class="media-btn off" id="btn-leave" title="Leave game">✕</button>
</div>

<div id="debug-panel" class="hidden"></div>

<div id="modal" style="display:none">
  <div class="modal-card">
    <p id="modal-msg"></p>
    <div>
      <button id="modal-yes">Yes</button>
      <button id="modal-no">No</button>
    </div>
  </div>
</div>

<script>
const ROWS = 6;
const COLS = 7;
const EMPTY = 0;
const RED = 1;
const YELLOW = 2;

let board, currentPlayer, gameOver;

// Multiplayer state
let mode = 'local';
let myRole = null;
let peer = null;
let conn = null;
let mediaConn = null;
let localStream = null;
let resetPending = false;

function init() {
  board = Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
  currentPlayer = RED;
  gameOver = false;
  render();
  updateStatus();
}

function colorClass(player) {
  return player === RED ? 'red' : 'yellow';
}

function playerName(player) {
  return player === RED ? 'Red' : 'Yellow';
}

function updateStatus(msg) {
  const el = document.getElementById('status');
  if (msg) {
    el.innerHTML = msg;
  } else if (mode === 'online') {
    const isMyTurn = currentPlayer === myRole;
    el.innerHTML = `<span class="disc" style="background:${currentPlayer === RED ? '#e63946' : '#ffd60a'}"></span> ${isMyTurn ? 'Your turn' : "Opponent's turn"}`;
  } else {
    el.innerHTML = `<span class="disc" style="background:${currentPlayer === RED ? '#e63946' : '#ffd60a'}"></span> ${playerName(currentPlayer)}'s turn`;
  }
}

function lowestEmptyRow(col) {
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r][col] === EMPTY) return r;
  }
  return -1;
}

function dropDisc(col) {
  if (gameOver) return;
  const row = lowestEmptyRow(col);
  if (row === -1) return;

  board[row][col] = currentPlayer;
  render(col, row);

  const winCells = checkWin(row, col);
  if (winCells) {
    gameOver = true;
    highlightWin(winCells);
    let winLabel = playerName(currentPlayer) + ' wins!';
    if (mode === 'online') winLabel = currentPlayer === myRole ? 'You win!' : 'You lose!';
    updateStatus(`<span class="disc" style="background:${currentPlayer === RED ? '#e63946' : '#ffd60a'}"></span> ${winLabel}`);
    updateBoardLock();
    return;
  }

  if (board[0].every((_, c) => lowestEmptyRow(c) === -1)) {
    gameOver = true;
    updateStatus("It's a draw!");
    return;
  }

  currentPlayer = currentPlayer === RED ? YELLOW : RED;
  updateStatus();
  updateBoardLock();
}

function checkWin(row, col) {
  const directions = [
    [0, 1],   // horizontal
    [1, 0],   // vertical
    [1, 1],   // diagonal ↘
    [1, -1],  // diagonal ↙
  ];
  const player = board[row][col];

  for (const [dr, dc] of directions) {
    let cells = [[row, col]];
    for (const sign of [1, -1]) {
      for (let i = 1; i < 4; i++) {
        const r = row + dr * i * sign;
        const c = col + dc * i * sign;
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) break;
        if (board[r][c] !== player) break;
        cells.push([r, c]);
      }
    }
    if (cells.length >= 4) return cells;
  }
  return null;
}

function highlightWin(cells) {
  for (const [r, c] of cells) {
    const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
    if (cell) cell.classList.add('win');
  }
}

function render(dropCol, dropRow) {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;

      if (board[r][c] === RED) cell.classList.add('red');
      else if (board[r][c] === YELLOW) cell.classList.add('yellow');

      if (dropCol === c && dropRow === r) {
        cell.classList.add('dropping');
        cell.style.setProperty('--drop-rows', dropRow);
      }

      cell.addEventListener('click', () => handleCellClick(c));
      cell.addEventListener('mouseenter', () => previewColumn(c));
      cell.addEventListener('mouseleave', clearPreview);

      boardEl.appendChild(cell);
    }
  }
}

function previewColumn(col) {
  if (gameOver) return;
  if (mode === 'online' && currentPlayer !== myRole) return;
  const row = lowestEmptyRow(col);
  if (row === -1) return;
  const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
  if (cell && board[row][col] === EMPTY) {
    cell.classList.add(`preview-${colorClass(currentPlayer)}`);
  }
}

function clearPreview() {
  document.querySelectorAll('.cell').forEach(c => {
    c.classList.remove('preview-red', 'preview-yellow');
  });
}

document.getElementById('reset').addEventListener('click', handleReset);

// --- Multiplayer functions ---

function handleCellClick(col) {
  if (mode === 'local') {
    dropDisc(col);
  } else if (mode === 'online') {
    if (gameOver || currentPlayer !== myRole) return;
    dropDisc(col);
    if (conn && conn.open) conn.send({ type: 'move', col });
  }
}

function handleReset() {
  if (mode === 'local') {
    init();
  } else if (mode === 'online') {
    if (!conn || !conn.open) return;
    resetPending = true;
    conn.send({ type: 'reset' });
    updateStatus('Reset requested... waiting for opponent');
  }
}

function updateBoardLock() {
  const boardEl = document.getElementById('board');
  if (mode === 'online' && currentPlayer !== myRole && !gameOver) {
    boardEl.classList.add('locked');
  } else {
    boardEl.classList.remove('locked');
  }
}

// Room code generation (no ambiguous chars)
function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// Lobby management
function showLobby(view) {
  const lobby = document.getElementById('lobby');
  lobby.classList.add('visible');
  document.getElementById('lobby-menu').style.display = view === 'menu' ? '' : 'none';
  document.getElementById('lobby-waiting').style.display = view === 'waiting' ? '' : 'none';
  document.getElementById('lobby-joining').style.display = view === 'joining' ? '' : 'none';
  document.getElementById('lobby-error').style.display = view === 'error' ? '' : 'none';
  document.getElementById('join-input').style.display = 'none';
}

function hideLobby() {
  document.getElementById('lobby').classList.remove('visible');
}

function showLobbyError(msg) {
  document.getElementById('error-msg').textContent = msg;
  showLobby('error');
}

// PeerJS connection
function createGame() {
  const roomCode = generateRoomCode();
  mode = 'online';
  myRole = RED;

  peer = new Peer('c4-' + roomCode);

  peer.on('open', () => {
    showLobby('waiting');
    document.getElementById('room-code-display').textContent = roomCode;
    document.getElementById('lobby-status').textContent = 'Waiting for opponent...';
  });

  peer.on('connection', (dataConn) => {
    conn = dataConn;
    setupDataConnection();
    startMediaCall();
  });

  peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      peer.destroy();
      createGame();
    } else {
      showLobbyError('Connection failed: ' + err.message);
    }
  });
}

function joinGame(roomCode) {
  mode = 'online';
  myRole = YELLOW;

  peer = new Peer();

  peer.on('open', () => {
    conn = peer.connect('c4-' + roomCode, { reliable: true });

    conn.on('open', () => {
      setupDataConnection();
      answerMediaCall();
      hideLobby();
      init();
      updateBoardLock();
    });
  });

  peer.on('error', (err) => {
    if (err.type === 'peer-unavailable') {
      showLobbyError('Room not found. Check the code and try again.');
    } else {
      showLobbyError('Connection failed: ' + err.message);
    }
  });
}

function setupDataConnection() {
  conn.on('data', (data) => {
    switch (data.type) {
      case 'move':
        dropDisc(data.col);
        updateBoardLock();
        break;
      case 'reset':
        showModal('Opponent wants a new game. Accept?', () => {
          conn.send({ type: 'reset-ack' });
          init();
          updateBoardLock();
        }, () => {
          conn.send({ type: 'reset-decline' });
        });
        break;
      case 'reset-ack':
        resetPending = false;
        init();
        updateBoardLock();
        break;
      case 'reset-decline':
        resetPending = false;
        updateStatus("Opponent declined the rematch");
        break;
    }
  });

  conn.on('close', handleDisconnect);

  showMediaControls();

  // Host: guest just connected
  if (myRole === RED) {
    hideLobby();
    init();
    updateBoardLock();
  }
}

function handleDisconnect() {
  stopRemoteCanvasRender();
  gameOver = true;
  updateStatus('Opponent disconnected');
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  document.getElementById('local-video').classList.add('hidden');
  document.getElementById('remote-canvas').classList.add('hidden');
  hideMediaControls();
  showModal('Opponent disconnected. Return to lobby?', () => {
    cleanupPeer();
    showLobby('menu');
  }, null);
}

function cleanupPeer() {
  stopRemoteCanvasRender();
  if (debugInterval) { clearInterval(debugInterval); debugInterval = null; }
  document.getElementById('debug-panel').classList.add('hidden');
  if (conn) { conn.close(); conn = null; }
  if (mediaConn) { mediaConn.close(); mediaConn = null; }
  if (peer) { peer.destroy(); peer = null; }
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  mode = 'local';
  myRole = null;
  resetPending = false;
  document.getElementById('local-video').classList.add('hidden');
  document.getElementById('remote-canvas').classList.add('hidden');
  hideMediaControls();
}

// Video/audio
const mediaConstraints = {
  video: { width: { ideal: 320 }, height: { ideal: 240 }, frameRate: { ideal: 15 } },
  audio: true
};

function playVideo(el) {
  const p = el.play();
  if (p) p.catch(() => {});
}

let remoteReader = null;
let remoteRafId = null;

function startRemoteCanvasRender(track) {
  stopRemoteCanvasRender();
  const canvas = document.getElementById('remote-canvas');
  const ctx = canvas.getContext('2d');

  if (typeof MediaStreamTrackProcessor !== 'undefined') {
    // Read frames directly from WebRTC track — bypasses <video> element entirely
    const processor = new MediaStreamTrackProcessor({ track });
    remoteReader = processor.readable.getReader();
    (async () => {
      try {
        while (true) {
          const { value: frame, done } = await remoteReader.read();
          if (done) break;
          if (canvas.width !== frame.displayWidth || canvas.height !== frame.displayHeight) {
            canvas.width = frame.displayWidth;
            canvas.height = frame.displayHeight;
          }
          ctx.drawImage(frame, 0, 0);
          frame.close();
        }
      } catch (e) { /* reader cancelled */ }
    })();
  } else {
    // Fallback for Safari/Firefox: draw from video element
    const video = document.getElementById('remote-video');
    function draw() {
      if (video.paused) playVideo(video);
      if (video.videoWidth > 0 && video.videoHeight > 0) {
        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }
        ctx.drawImage(video, 0, 0);
      }
      remoteRafId = requestAnimationFrame(draw);
    }
    draw();
  }
}

function stopRemoteCanvasRender() {
  if (remoteReader) { remoteReader.cancel().catch(() => {}); remoteReader = null; }
  if (remoteRafId) { cancelAnimationFrame(remoteRafId); remoteRafId = null; }
}

// Use RTCPeerConnection.ontrack for reliable stream/track access.
function hookRemoteTrack(call) {
  const pc = call.peerConnection;
  if (!pc) return;
  pc.ontrack = (event) => {
    // Attach stream to hidden video element for audio playback
    const remoteVid = document.getElementById('remote-video');
    const stream = event.streams[0] || new MediaStream([event.track]);
    remoteVid.srcObject = stream;
    playVideo(remoteVid);

    if (event.track.kind === 'video') {
      document.getElementById('remote-canvas').classList.remove('hidden');
      startRemoteCanvasRender(event.track);
    }
    console.log('[ontrack]', event.track.kind, event.track.readyState);
  };
}

async function startMediaCall() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia(mediaConstraints);
    const localVid = document.getElementById('local-video');
    localVid.srcObject = localStream;
    localVid.classList.remove('hidden');
    playVideo(localVid);

    const call = peer.call(conn.peer, localStream);
    hookRemoteTrack(call);
    mediaConn = call;
    showMediaControls();
  } catch (err) {
    console.log('Camera not available:', err.message);
  }
}

function answerMediaCall() {
  peer.on('call', async (call) => {
    try {
      localStream = await navigator.mediaDevices.getUserMedia(mediaConstraints);
      const localVid = document.getElementById('local-video');
      localVid.srcObject = localStream;
      localVid.classList.remove('hidden');
      playVideo(localVid);
      call.answer(localStream);
    } catch (err) {
      call.answer();
    }
    hookRemoteTrack(call);
    mediaConn = call;
    showMediaControls();
  });
}

// Auto-resume local video if browser pauses it
document.getElementById('local-video').addEventListener('pause', (e) => { if (mode === 'online') playVideo(e.target); });

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    const local = document.getElementById('local-video');
    const remote = document.getElementById('remote-video');
    if (local.srcObject) playVideo(local);
    if (remote.srcObject) playVideo(remote);
  }
});

// Media controls
function showMediaControls() {
  document.getElementById('media-controls').classList.remove('hidden');
}

function hideMediaControls() {
  document.getElementById('media-controls').classList.add('hidden');
}

document.getElementById('btn-mic').addEventListener('click', () => {
  if (!localStream) return;
  const track = localStream.getAudioTracks()[0];
  if (!track) return;
  track.enabled = !track.enabled;
  const btn = document.getElementById('btn-mic');
  btn.textContent = track.enabled ? '🎤' : '🎤';
  btn.classList.toggle('off', !track.enabled);
});

document.getElementById('btn-cam').addEventListener('click', async () => {
  if (!localStream) return;
  const btn = document.getElementById('btn-cam');
  const oldTrack = localStream.getVideoTracks()[0];

  if (oldTrack && oldTrack.readyState === 'live') {
    // Turn off: stop the hardware and remove from stream
    oldTrack.stop();
    localStream.removeTrack(oldTrack);
    btn.classList.add('off');
  } else {
    // Turn on: remove any dead tracks, get a fresh video track
    localStream.getVideoTracks().forEach(t => localStream.removeTrack(t));
    try {
      const newStream = await navigator.mediaDevices.getUserMedia({ video: true });
      const newTrack = newStream.getVideoTracks()[0];
      localStream.addTrack(newTrack);
      // Update local preview
      const localVid = document.getElementById('local-video');
      localVid.srcObject = localStream;
      playVideo(localVid);
      // Replace track in the peer connection so remote sees video again
      if (mediaConn && mediaConn.peerConnection) {
        const sender = mediaConn.peerConnection.getSenders().find(s => s.track === null || s.track?.kind === 'video');
        if (sender) sender.replaceTrack(newTrack);
      }
      btn.classList.remove('off');
    } catch (err) {
      console.log('Could not restart camera:', err.message);
    }
  }
});

document.getElementById('btn-speaker').addEventListener('click', () => {
  const remoteVid = document.getElementById('remote-video');
  remoteVid.muted = !remoteVid.muted;
  const btn = document.getElementById('btn-speaker');
  btn.textContent = remoteVid.muted ? '🔇' : '🔊';
  btn.classList.toggle('off', remoteVid.muted);
});

document.getElementById('btn-leave').addEventListener('click', () => {
  showModal('Leave the game?', () => {
    cleanupPeer();
    showLobby('menu');
    init();
  }, () => {});
});

// Debug panel
let debugInterval = null;

document.getElementById('btn-debug').addEventListener('click', () => {
  const panel = document.getElementById('debug-panel');
  if (panel.classList.toggle('hidden')) {
    clearInterval(debugInterval);
    debugInterval = null;
  } else {
    updateDebug();
    debugInterval = setInterval(updateDebug, 1000);
  }
});

async function updateDebug() {
  const panel = document.getElementById('debug-panel');
  const pc = mediaConn?.peerConnection;
  const lines = [];

  // ICE & connection state
  if (pc) {
    lines.push('ICE: ' + pc.iceConnectionState);
    lines.push('Conn: ' + pc.connectionState);
    lines.push('Signal: ' + pc.signalingState);
  } else {
    lines.push('No PeerConnection');
  }

  // Local tracks
  if (localStream) {
    localStream.getTracks().forEach(t => {
      lines.push('L ' + t.kind + ': ' + t.readyState + (t.muted ? ' MUTED' : '') + (t.enabled ? '' : ' DISABLED'));
    });
  }

  // Remote tracks
  const remoteVid = document.getElementById('remote-video');
  if (remoteVid.srcObject) {
    remoteVid.srcObject.getTracks().forEach(t => {
      lines.push('R ' + t.kind + ': ' + t.readyState + (t.muted ? ' MUTED' : '') + (t.enabled ? '' : ' DISABLED'));
    });
  }

  // Audio element state
  lines.push('');
  lines.push('Audio el muted: ' + remoteVid.muted);
  lines.push('Audio el volume: ' + remoteVid.volume);
  lines.push('Audio el paused: ' + remoteVid.paused);

  // RTCStats
  if (pc) {
    try {
      const stats = await pc.getStats();
      stats.forEach(s => {
        if (s.type === 'inbound-rtp' && s.kind === 'audio') {
          lines.push('');
          lines.push('--- inbound audio ---');
          lines.push('Bytes recv: ' + s.bytesReceived);
          lines.push('Pkts recv: ' + s.packetsReceived);
          lines.push('Pkts lost: ' + s.packetsLost);
          lines.push('Jitter: ' + (s.jitter?.toFixed(3) ?? '?'));
          if (s.codecId) {
            const codec = stats.get(s.codecId);
            if (codec) lines.push('Codec: ' + (codec.mimeType ?? '?'));
          }
        }
        if (s.type === 'inbound-rtp' && s.kind === 'video') {
          lines.push('');
          lines.push('--- inbound video ---');
          lines.push('Bytes recv: ' + s.bytesReceived);
          lines.push('Frames dec: ' + (s.framesDecoded ?? '?'));
          lines.push('Frames drop: ' + (s.framesDropped ?? '?'));
          lines.push('FreezeCount: ' + (s.freezeCount ?? '?'));
          if (s.codecId) {
            const codec = stats.get(s.codecId);
            if (codec) lines.push('Codec: ' + (codec.mimeType ?? '?'));
          }
        }
        if (s.type === 'candidate-pair' && s.state === 'succeeded') {
          lines.push('');
          lines.push('RTT: ' + (s.currentRoundTripTime * 1000).toFixed(0) + 'ms');
          const local = stats.get(s.localCandidateId);
          const remote = stats.get(s.remoteCandidateId);
          if (local) lines.push('Local: ' + local.candidateType + ' ' + (local.protocol ?? ''));
          if (remote) lines.push('Remote: ' + remote.candidateType + ' ' + (remote.protocol ?? ''));
        }
      });
    } catch (e) {}
  }

  panel.textContent = lines.join('\n');
}

// Modal
function showModal(message, onYes, onNo) {
  const modal = document.getElementById('modal');
  document.getElementById('modal-msg').textContent = message;

  const yesBtn = document.getElementById('modal-yes');
  const noBtn = document.getElementById('modal-no');

  if (onNo === null) {
    noBtn.style.display = 'none';
    yesBtn.textContent = 'OK';
  } else {
    noBtn.style.display = '';
    yesBtn.textContent = 'Yes';
  }

  const newYes = yesBtn.cloneNode(true);
  const newNo = noBtn.cloneNode(true);
  yesBtn.replaceWith(newYes);
  noBtn.replaceWith(newNo);

  newYes.addEventListener('click', () => { hideModal(); if (onYes) onYes(); });
  newNo.addEventListener('click', () => { hideModal(); if (onNo) onNo(); });

  modal.style.display = '';
}

function hideModal() {
  document.getElementById('modal').style.display = 'none';
}

// Link sharing
function getShareUrl(roomCode) {
  const url = new URL(location.href.split('?')[0]);
  url.searchParams.set('room', roomCode);
  return url.toString();
}

// Lobby button handlers
document.getElementById('btn-local').addEventListener('click', () => {
  mode = 'local';
  hideLobby();
  init();
});

document.getElementById('btn-create').addEventListener('click', createGame);

document.getElementById('btn-show-join').addEventListener('click', () => {
  document.getElementById('join-input').style.display = '';
  document.getElementById('room-input').focus();
});

document.getElementById('btn-join').addEventListener('click', () => {
  const code = document.getElementById('room-input').value.trim().toUpperCase();
  if (code.length < 4) return;
  showLobby('joining');
  joinGame(code);
});

document.getElementById('room-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('btn-join').click();
});

document.getElementById('btn-share').addEventListener('click', () => {
  const roomCode = document.getElementById('room-code-display').textContent;
  const url = getShareUrl(roomCode);
  if (navigator.share) {
    navigator.share({ title: 'Connect Four', text: 'Join my game!', url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('btn-share');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Link', 2000);
    });
  }
});

document.getElementById('btn-back').addEventListener('click', () => {
  cleanupPeer();
  showLobby('menu');
});

// Start: check URL params
function checkUrlAndStart() {
  const params = new URLSearchParams(location.search);
  const roomCode = params.get('room');
  if (roomCode) {
    showLobby('joining');
    joinGame(roomCode.toUpperCase());
  } else {
    showLobby('menu');
  }
  // Pre-render empty board behind lobby
  init();
}

checkUrlAndStart();
